<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="#111827"/>
  
  <!-- Grid overlay for tech look -->
  <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800M0 400H800" stroke="#374151" stroke-opacity="0.15" stroke-width="1"/>
  <path d="M100 0V450M200 0V450M300 0V450M400 0V450M500 0V450M600 0V450M700 0V450" stroke="#374151" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Decorative Abstract Circles/Glow -->
  <circle cx="400" cy="225" r="180" fill="#14b8a6" fill-opacity="0.03" filter="blur(40px)"/>
  <circle cx="600" cy="300" r="120" fill="#9ca3af" fill-opacity="0.02" filter="blur(30px)"/>

  <!-- Brand Identity Mockup Showcase (Notebook / Tablet & Business cards) -->
  <g transform="translate(180, 50)">
    <!-- Device Frame (Tablet vertical/horizontal or Laptop) -->
    <!-- Let's do a sleek laptop mockup -->
    <!-- Screen -->
    <rect x="40" y="20" width="360" height="230" rx="16" fill="#1f2937" stroke="#374151" stroke-width="2"/>
    <!-- Inner Screen Display -->
    <rect x="52" y="32" width="336" height="206" rx="8" fill="#111827"/>
    
    <!-- Laptop Base -->
    <path d="M10 250H430C435.523 250 440 254.477 440 260V264C440 266.209 438.209 268 436 268H4C1.79086 268 0 266.209 0 264V260C0 254.477 4.47715 250 10 250Z" fill="#374151" stroke="#4b5563" stroke-width="2"/>
    <!-- Laptop Trackpad / Notch -->
    <rect x="195" y="251" width="50" height="4" rx="2" fill="#111827"/>
    <path d="M190 250H250V254C250 255.105 249.105 256 248 256H192C190.895 256 190 255.105 190 254V250Z" fill="#1f2937"/>

    <!-- Screen Content: Sleek abstract brand identity graphic -->
    <g transform="translate(52, 32)">
      <!-- Geometric Art -->
      <path d="M60 40L140 160H60V40Z" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="2" stroke-linejoin="round"/>
      <path d="M140 40L220 160H140V40Z" fill="#9ca3af" fill-opacity="0.1" stroke="#9ca3af" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="240" cy="100" r="30" fill="#111827" stroke="#374151" stroke-width="2"/>
      <path d="M232 100H248M240 92V108" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"/>
      <!-- Text placeholder lines in screen -->
      <rect x="60" y="180" width="100" height="8" rx="4" fill="#374151"/>
      <rect x="220" y="180" width="60" height="8" rx="4" fill="#14b8a6" fill-opacity="0.6"/>
    </g>

    <!-- Business Card Mockup (overlapping the laptop) -->
    <g transform="translate(290, 160)">
      <!-- Business Card Background -->
      <rect x="0" y="0" width="140" height="80" rx="8" fill="#1f2937" stroke="#4b5563" stroke-width="1.5" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.5))"/>
      <!-- Brand Logo on card -->
      <circle cx="30" cy="40" r="12" fill="#14b8a6" fill-opacity="0.8"/>
      <rect x="52" y="32" width="50" height="6" rx="2" fill="#e5e7eb" fill-opacity="0.9"/>
      <rect x="52" y="44" width="30" height="4" rx="2" fill="#9ca3af" fill-opacity="0.6"/>
      <!-- Small details -->
      <line x1="110" y1="65" x2="130" y2="65" stroke="#374151" stroke-width="2"/>
    </g>

    <!-- Another overlay - Smartphone or small card -->
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="70" height="110" rx="10" fill="#111827" stroke="#374151" stroke-width="2" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.4))"/>
      <!-- Screen Notch -->
      <rect x="20" y="4" width="30" height="4" rx="2" fill="#374151"/>
      <!-- Mobile screen graphic -->
      <circle cx="35" cy="50" r="16" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1.5"/>
      <rect x="15" y="80" width="40" height="4" rx="2" fill="#4b5563"/>
      <rect x="20" y="90" width="30" height="4" rx="2" fill="#374151"/>
    </g>
  </g>
</svg>
