<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="#111827"/>
  
  <!-- Grid overlay for tech look -->
  <path d="M0 50H800M0 100H800M0 150H800M0 200H800M0 250H800M0 300H800M0 350H800M0 400H800" stroke="#374151" stroke-opacity="0.15" stroke-width="1"/>
  <path d="M100 0V450M200 0V450M300 0V450M400 0V450M500 0V450M600 0V450M700 0V450" stroke="#374151" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Decorative Abstract Circles/Glow -->
  <circle cx="400" cy="225" r="180" fill="#14b8a6" fill-opacity="0.03" filter="blur(40px)"/>
  <circle cx="200" cy="150" r="120" fill="#9ca3af" fill-opacity="0.02" filter="blur(30px)"/>

  <!-- Browser Window Mockup -->
  <g transform="translate(100, 60)">
    <!-- Browser Frame -->
    <rect width="600" height="330" rx="12" fill="#1f2937" stroke="#374151" stroke-width="2"/>
    
    <!-- Browser Header -->
    <path d="M0 12C0 5.37258 5.37258 0 12 0H588C594.627 0 600 5.37258 600 12V40H0V12Z" fill="#111827" stroke="#374151" stroke-width="2"/>
    
    <!-- Browser Dots -->
    <circle cx="20" cy="20" r="6" fill="#ef4444" fill-opacity="0.6"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b" fill-opacity="0.6"/>
    <circle cx="60" cy="20" r="6" fill="#10b981" fill-opacity="0.6"/>
    
    <!-- Address Bar -->
    <rect x="90" y="10" width="420" height="20" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="300" y="24" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.6">agency-lite-ecommerce-redesign.test</text>
    
    <!-- Inner Web Page Content -->
    <!-- Hero Header within Browser -->
    <rect x="30" y="65" width="240" height="24" rx="4" fill="#374151" fill-opacity="0.7"/>
    <rect x="30" y="99" width="180" height="12" rx="3" fill="#4b5563" fill-opacity="0.5"/>
    <rect x="30" y="117" width="120" height="12" rx="3" fill="#4b5563" fill-opacity="0.5"/>
    
    <!-- CTA Button -->
    <rect x="30" y="145" width="90" height="28" rx="6" fill="#14b8a6" fill-opacity="0.8"/>
    <rect x="45" y="155" width="60" height="8" rx="2" fill="#111827" fill-opacity="0.8"/>
    
    <!-- Feature Image/Card Graphic (E-commerce Grid mockup) -->
    <g transform="translate(310, 65)">
      <!-- Main showcase block -->
      <rect width="260" height="140" rx="8" fill="#374151" fill-opacity="0.4" stroke="#4b5563" stroke-width="1.5"/>
      <!-- Decorative graph / wireframe lines -->
      <path d="M20 110L80 70L140 90L200 40L240 60" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="200" cy="40" r="5" fill="#14b8a6"/>
      <circle cx="80" cy="70" r="4" fill="#14b8a6"/>
      <!-- Subtle bar charts -->
      <rect x="20" y="125" width="30" height="5" rx="1.5" fill="#9ca3af" fill-opacity="0.4"/>
      <rect x="60" y="125" width="45" height="5" rx="1.5" fill="#9ca3af" fill-opacity="0.4"/>
    </g>

    <!-- Lower Section Cards -->
    <g transform="translate(30, 225)">
      <!-- Card 1 -->
      <rect x="0" y="0" width="165" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
      <rect x="15" y="15" width="40" height="40" rx="6" fill="#374151"/>
      <rect x="70" y="20" width="80" height="10" rx="3" fill="#4b5563"/>
      <rect x="70" y="38" width="60" height="8" rx="3" fill="#4b5563" fill-opacity="0.5"/>
      <rect x="70" y="52" width="40" height="8" rx="3" fill="#4b5563" fill-opacity="0.3"/>

      <!-- Card 2 -->
      <rect x="185" y="0" width="165" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
      <rect x="200" y="15" width="40" height="40" rx="6" fill="#374151"/>
      <rect x="255" y="20" width="80" height="10" rx="3" fill="#4b5563"/>
      <rect x="255" y="38" width="60" height="8" rx="3" fill="#4b5563" fill-opacity="0.5"/>
      <rect x="255" y="52" width="40" height="8" rx="3" fill="#4b5563" fill-opacity="0.3"/>

      <!-- Card 3 -->
      <rect x="370" y="0" width="170" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
      <rect x="385" y="15" width="40" height="40" rx="6" fill="#14b8a6" fill-opacity="0.2"/>
      <path d="M400 30L405 35L412 25" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="440" y="20" width="85" height="10" rx="3" fill="#4b5563"/>
      <rect x="440" y="38" width="70" height="8" rx="3" fill="#4b5563" fill-opacity="0.5"/>
      <rect x="440" y="52" width="50" height="8" rx="3" fill="#4b5563" fill-opacity="0.3"/>
    </g>
  </g>
</svg>
